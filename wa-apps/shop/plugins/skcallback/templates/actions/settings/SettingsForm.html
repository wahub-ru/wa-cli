<div class="field">
    <div class="name">
        <label>Загаловок формы</label>
    </div>
    <div class="value">
        <input type="text" name="shop_skcallback_defines[title]" value="{$defines.title|escape}" />
    </div>
</div>
<div class="field">
    <div class="name">
        <label>Текст кнопки отправки</label>
    </div>
    <div class="value">
        <input type="text" name="shop_skcallback_defines[button]" value="{$defines.button|escape}" />
    </div>
</div>
<div class="field">
    <div class="name">
        <label>Вступительный тескт</label>
    </div>
    <div class="value">
        <textarea class="js-sk-editor" name="shop_skcallback_defines[text]">{$defines.text}</textarea>
    </div>
</div>
<div class="field">
    <div class="name">
        <label>Загаловок успешной отправки</label>
    </div>
    <div class="value">
        <input type="text" name="shop_skcallback_defines[title_success]" value="{$defines.title_success|escape}" />
    </div>
</div>
<div class="field">
    <div class="name">
        <label>Текст успешной отправки</label>
    </div>
    <div class="value">
        <textarea class="js-sk-editor" name="shop_skcallback_defines[text_success]">{$defines.text_success}</textarea>
    </div>
</div>
<div class="field">
    <div class="name">
        <label>Капча</label>
    </div>
    <div class="value">
        <select name="shop_skcallback_defines[captcha]" autocomplete="off" id="skcallback_shop_skcallback_search_region" class="select" title="Определять регион по ip">
            <option value="1"{if !empty($defines.captcha) && $defines.captcha == 1}selected="selected"{/if}>Включена</option>
            <option value="0"{if empty($defines.captcha)}selected="selected"{/if}>Отключена</option>
        </select>
    </div>
</div>
<div class="field">
    <div class="name">
        <label>Редактор полей</label>
    </div>
    <div class="value">

        <div class="shop-sk-generate-form js-sk-generate-form">

            <table class="shop-sk-generate-form__table js-sk-generate-form-table zebra mode-sales">
                <tbody class="shop-sk-generate-form__body js-sk-generate-form-body">
                    {foreach $controls as $control}
                        {include file="./SettingsField.html" control=$control}
                    {/foreach}
                </tbody>
            </table>

            <div class="shop-sk-generate-form__add">
                <select class="shop-sk-generate-form__add-select js-sk-generate-form-add-select">
                    <option value="">Выберите поле</option>
                    {foreach $controls_type as $type}
                    <option value="{$type.id}">{$type.title}</option>
                    {/foreach}
                </select>
                &nbsp;&nbsp;
                <a href="javascript:void(0)" class="js-sk-generate-form-add-link">Добавить поле</a>
            </div>

        </div>

    </div>
</div>

{literal}
<script type="text/javascript">

    $(function () {

        if ($().redactor !== undefined) {
             $('.js-sk-editor').redactor();
        }

        $('.js-sk-editor').data('uploadFields', {
            '_csrf': "{waRequest::cookie('_csrf', '')}"
        });

        $( ".js-sk-generate-form-body" ).sortable();

    })
</script>
{/literal}
