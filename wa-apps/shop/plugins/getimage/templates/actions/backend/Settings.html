<div class="fields">
    <div class="field">
        <div class="name">Размер текста по умолчанию</div>
        <div class="value">
            <input type="number"
                   name="settings[default_font_size]"
                   value="{$settings.default_font_size|default:20}"
                   min="10"
                   max="100">
            <span class="hint">Пикселей (если не указан параметр size)</span>
        </div>
    </div>
</div>
