<div>
    {if isset($error)}
        <div class="dialog-content">
            <div class="fields">
                <div class="field">
                    <div class="value">
                        <span class="state-error">{$error}</span>
                    </div>
                </div>
            </div>
        </div>
    {else}
        <div class="dialog-content">
            <form>
                <div class="fields">
                    <div class="field">
                        <div class="name">[`File`]</div>
                        <div class="value">
                            <strong class="break-all">{if strlen($item.folder|default:'')}<span class="gray">{$item.folder}</span>{/if}{$item.name}</strong>
                        </div>
                    </div>
                    <div class="field">
                        <div class="name">[`Search query`]</div>
                        <div class="value">
                            <input type="text" name="query" value="{$wa->get('query')|escape:'hexentity'}" class="long" data-loc-empty-field-message="[`Empty search query.`]">
                        </div>
                    </div>
                    <div class="field">
                        <div class="value">
                            <span class="state-error"></span>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="path" value="{$path|escape}">
            </form>
        </div>
        <footer class="dialog-footer">
            <div>
                <button class="button blue js-submit icon-button">[`Search`] <span class="icon"><i class="fas fa-search"></i></span></button>
                {if $file_search_cancel_url|default:''|strlen}
                    <a href="{$file_search_cancel_url}" class="button dark-gray icon-button">[`Finish search`] <span class="icon"><i class="fas fa-times"></i></span></a>
                {/if}
                <button class="button light-gray js-close-dialog">[`Close`]</button>
            </div>
        </footer>
    {/if}
</div>
